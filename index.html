<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Егора</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: 'Press Start 2P', cursive;
  color: white;

  background: linear-gradient(#5c94fc, #a9d6ff);
}

/* пиксельные облака */
.cloud {
  position: absolute;
  width: 200px;
  height: 60px;
  background: white;
  box-shadow:
    20px 0 white,
    40px 0 white,
    60px 0 white,
    80px 0 white,
    100px 0 white;
  image-rendering: pixelated;
  animation: moveClouds linear infinite;
}

.cloud1 { top: 20%; left: -250px; animation-duration: 60s; }
.cloud2 { top: 40%; left: -300px; animation-duration: 80s; }
.cloud3 { top: 60%; left: -200px; animation-duration: 70s; }

@keyframes moveClouds {
  from { transform: translateX(0); }
  to { transform: translateX(200vw); }
}

/* карточка */
.card {
  background: #2d2d2d;
  padding: 30px;
  border: 4px solid #000;
  box-shadow: 8px 8px 0 #000;
  max-width: 500px;
  text-align: center;
}

h1 {
  font-size: 16px;
}

.counter {
  margin: 20px 0;
  font-size: 14px;
}

.text {
  font-size: 12px;
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 10px;
  font-family: inherit;
  background: #ffcc00;
  border: 3px solid #000;
  cursor: pointer;
}

iframe {
  margin-top: 20px;
  width: 100%;
  height: 250px;
  display: none;
  border: 3px solid black;
}
</style>
</head>

<body>

<!-- облака -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="card">
  <h1>ЕГОР, СМОТРИ</h1>

  <div class="counter" id="counter">...</div>

  <div class="text">
    мы уже столько времени дружим<br>
    и это реально круто
  </div>

  <button onclick="startExperience()">ЖМИ</button>

  <iframe id="video"
    src=""
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<script>
const startDate = new Date("2021-04-14T00:00:00");

function getTime() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  return days + " ДНЕЙ " + hours + " ЧАСОВ " + minutes + " МИНУТ";
}

function startExperience() {
  confetti({
    particleCount: 120,
    spread: 70
  });

  document.getElementById("counter").innerText = getTime();

  const video = document.getElementById("video");
  video.style.display = "block";
  video.src = "https://www.youtube.com/embed/KtRjdUJIQe4?autoplay=1&rel=0";
}
</script>

</body>
</html>
