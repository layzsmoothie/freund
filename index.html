<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Для Егора</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      padding: 50px;
      color: #333;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.2s ease;
    }

    .counter {
      font-size: 32px;
      font-weight: bold;
      margin: 20px 0;
    }

    .text {
      font-size: 18px;
      margin-top: 20px;
    }

    button {
      margin-top: 25px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      background: #ff7a7a;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    iframe {
      margin-top: 25px;
      width: 100%;
      height: 315px;
      border-radius: 12px;
      display: none;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>
</head>
<body>

<div class="card">
  <h1>💛 Егор, смотри что я нашёл</h1>
  <p>Я тут немного посчитал...</p>

  <div class="counter" id="counter">...</div>

  <div class="text">
    Мы с тобой уже столько времени вместе,<br>
    и если честно — это одна из самых ценных вещей в моей жизни
  </div>

  <button onclick="startExperience()">Нажми сюда 👇</button>

  <!-- встроенное видео -->
  <iframe id="video"
    src=""
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<script>
  const startDate = new Date("2021-04-14T00:00:00");

  function getTime() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);

    return `${days} дней ${hours} часов ${minutes} минут`;
  }

  function startExperience() {
    // конфетти
    confetti({
      particleCount: 160,
      spread: 90,
      origin: { y: 0.6 }
    });

    // показать счётчик
    document.getElementById("counter").innerText = getTime();

    // показать и запустить видео
    const video = document.getElementById("video");
    video.style.display = "block";
    video.src = "https://www.youtube.com/embed/KtRjdUJIQe4?autoplay=1&rel=0";
  }
</script>

</body>
</html>
