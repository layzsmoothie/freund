<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Егор</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0b1020;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* UI */
#ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  z-index: 10;
}

button {
  padding: 10px 20px;
  cursor: pointer;
  font-family: monospace;
}

/* персонажи */
.char {
  position: absolute;
  bottom: 80px;
  width: 40px;
  height: 60px;
}

/* ты */
#player {
  left: 60px;
  background: #caa06a;
}

/* Егор */
#egor {
  right: 60px;
  background: #e0b08a;
}

/* звёзды */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
}
</style>
</head>

<body>

<div id="ui">
  <div id="text">Нажми кнопку</div>
  <button onclick="start()">Старт</button>
</div>

<div id="player" class="char"></div>
<div id="egor" class="char"></div>

<script>
// звёзды (без ошибок, просто фон)
for (let i = 0; i < 80; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random() * 100 + "%";
  s.style.left = Math.random() * 100 + "%";
  document.body.appendChild(s);
}

function start() {
  const player = document.getElementById("player");
  const text = document.getElementById("text");

  text.innerText = "Ты идёшь к Егору...";

  player.style.transition = "left 2s linear";
  player.style.left = "60%";

  setTimeout(() => {
    text.innerText = "Егор: привет 😄";
  }, 2000);
}
</script>

</body>
</html>
