<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сколько мы дружим</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      padding: 50px;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      margin-bottom: 10px;
    }
    .days {
      font-size: 40px;
      font-weight: bold;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>💛 Сколько мы уже дружим</h1>
  <p>Я тут посчитал...</p>

  <div class="days" id="days"></div>

  <p>И это только начало 😄</p>
</div>

<script>
  // ВСТАВЬ СЮДА ДАТУ НАЧАЛА ДРУЖБЫ
  const startDate = new Date("2021-04-14"); 

  const today = new Date();
  const diffTime = today - startDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  document.getElementById("days").innerText = diffDays + " дней";
</script>

</body>
</html>
